<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sovereign Identity API Playground</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>⚡ API Playground</h1>

<p>
Test Verifiable Credential verification directly from the browser.
</p>

<hr>

<h2>Credential JSON</h2>

<textarea id="input" rows="12" cols="60">
{
  "id":"credential-demo-001",
  "issuer":"Sovereign Identity Engine",
  "subject":"user-demo",
  "network":"Base Mainnet"
}
</textarea>

<br><br>

<button onclick="verify()">
Verify Credential
</button>

<h2>Result</h2>

<div id="result"></div>

<script>
async function verify(){

try{

const data=document.getElementById("input").value;

JSON.parse(data);

const hashBuffer = await crypto.subtle.digest(
"SHA-256",
new TextEncoder().encode(data)
);

const hash=[...new Uint8Array(hashBuffer)]
.map(x=>x.toString(16).padStart(2,"0"))
.join("");

document.getElementById("result").innerHTML=
`
✅ Credential Structure Valid
<br><br>
Network: Base Mainnet
<br><br>
SHA-256:
<br>
${hash}
`;

}catch(e){

document.getElementById("result").innerHTML=
"❌ Invalid Credential JSON";

}

}
</script>

</body>
</html>
